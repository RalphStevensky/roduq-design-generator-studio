<!--
  Hero templates dla roduq-portfolio skill.
  Variants:
  - personal-statement — text-led, "Imię. Role. Specialty."
  - split-with-photo   — text + portrait side
  - work-led           — latest project as hero tile
-->

<section class="hero hero--personal" data-block-type="hero" data-variant="personal-statement">
  <div class="hero__container">
    <div class="hero__availability">
      <span class="hero__availability-dot"></span>
      <span>{{availability-text}}</span>
      <!-- "Dostępny dla nowych projektów · Q2 2026" -->
    </div>
    <h1 class="hero__title">{{hero-title}}</h1>
    <!-- "Anna Nowak. Projektantka UX z Warszawy." -->
    <p class="hero__subtitle">{{hero-subtitle}}</p>
    <!-- "Pracuję z SaaS B2B i fintech. 6 lat. Polski + angielski C1." -->
    <div class="hero__ctas">
      <a class="hero__cta hero__cta--primary" href="{{work-href}}">
        {{cta-work-label}}
        <!-- "Zobacz prace" -->
      </a>
      <a class="hero__cta hero__cta--email" href="mailto:{{email}}">
        {{email}}
      </a>
    </div>
    <div class="hero__social">
      <a href="{{linkedin-href}}" aria-label="LinkedIn">LinkedIn</a>
      <a href="{{github-href}}" aria-label="GitHub">GitHub</a>
      <a href="{{dribbble-href}}" aria-label="Dribbble">Dribbble</a>
      <a href="{{twitter-href}}" aria-label="Twitter">Twitter</a>
    </div>
  </div>
</section>

<section class="hero hero--split" data-block-type="hero" data-variant="split-with-photo">
  <div class="hero__container hero__container--grid">
    <div class="hero__content">
      <div class="hero__availability">
        <span class="hero__availability-dot"></span>
        <span>{{availability-text}}</span>
      </div>
      <h1 class="hero__title">{{hero-title}}</h1>
      <p class="hero__subtitle">{{hero-subtitle}}</p>
      <div class="hero__ctas">
        <a class="hero__cta hero__cta--primary" href="{{work-href}}">
          {{cta-work-label}}
        </a>
        <a class="hero__cta hero__cta--email" href="mailto:{{email}}">
          {{email}}
        </a>
      </div>
    </div>
    <div class="hero__photo">
      <img src="{{portrait-photo}}" alt="{{creator-name}}" loading="eager">
    </div>
  </div>
</section>

<style>
  .hero {
    padding: var(--space-4xl, 6rem) var(--space-md, 1rem);
    background: var(--color-surface-default);
    color: var(--color-ink-primary);
    min-height: 80vh;
    display: flex;
    align-items: center;
  }

  .hero__container {
    max-width: var(--container-md, 72rem);
    margin: 0 auto;
    width: 100%;
  }

  .hero__container--grid {
    display: grid;
    grid-template-columns: 1.4fr 1fr;
    gap: var(--space-2xl, 3rem);
    align-items: center;
  }

  @media (max-width: 768px) {
    .hero__container--grid {
      grid-template-columns: 1fr;
    }
  }

  .hero__availability {
    display: inline-flex;
    align-items: center;
    gap: var(--space-xs, 0.5rem);
    padding: var(--space-2xs, 0.25rem) var(--space-md, 1rem);
    border: 1px solid var(--color-outline-default);
    border-radius: var(--radius-full, 9999px);
    font-size: var(--text-sm, 0.875rem);
    color: var(--color-ink-secondary);
    margin-bottom: var(--space-lg, 1.5rem);
  }

  .hero__availability-dot {
    width: 0.5rem;
    height: 0.5rem;
    background: #10b981;
    border-radius: var(--radius-full, 9999px);
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  @media (prefers-reduced-motion: reduce) {
    .hero__availability-dot { animation: none; }
  }

  .hero__title {
    font-family: var(--font-display);
    font-size: clamp(2rem, 5vw, 4rem);
    font-weight: 700;
    line-height: 1.05;
    margin: 0 0 var(--space-md, 1rem);
    letter-spacing: -0.02em;
    max-width: 18ch;
  }

  .hero__subtitle {
    font-family: var(--font-body);
    font-size: var(--text-xl, 1.25rem);
    line-height: 1.5;
    color: var(--color-ink-secondary);
    margin: 0 0 var(--space-xl, 2rem);
    max-width: 50ch;
  }

  .hero__ctas {
    display: flex;
    gap: var(--space-md, 1rem);
    margin-bottom: var(--space-xl, 2rem);
    flex-wrap: wrap;
    align-items: center;
  }

  .hero__cta {
    padding: var(--space-md, 1rem) var(--space-xl, 2rem);
    border-radius: var(--radius-md, 0.5rem);
    text-decoration: none;
    font-weight: 500;
    min-height: 44px;
    display: inline-flex;
    align-items: center;
  }

  .hero__cta--primary {
    background: var(--color-ink-primary);
    color: var(--color-surface-default);
  }

  .hero__cta--email {
    color: var(--color-brand-primary);
    text-decoration: underline;
    text-underline-offset: 4px;
    padding: var(--space-md, 1rem) 0;
  }

  .hero__social {
    display: flex;
    gap: var(--space-lg, 1.5rem);
    font-size: var(--text-sm, 0.875rem);
  }

  .hero__social a {
    color: var(--color-ink-secondary);
    text-decoration: none;
    border-bottom: 1px solid transparent;
    padding-bottom: 2px;
  }

  .hero__social a:hover {
    color: var(--color-ink-primary);
    border-bottom-color: var(--color-brand-primary);
  }

  .hero__photo {
    aspect-ratio: 4 / 5;
    border-radius: var(--radius-lg, 0.75rem);
    overflow: hidden;
  }

  .hero__photo img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
</style>
